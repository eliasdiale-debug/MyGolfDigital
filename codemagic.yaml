workflows:
  ios-native:
    name: iOS Native Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 22.0.0
      npm: 10.0.0
      groups:
        - apple_credentials
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
          npm install -g @capacitor/cli
      - name: Add iOS platform
        script: |
          npx cap add ios
      - name: Install CocoaPods and init
        script: |
          sudo gem install cocoapods
          cd ios/App
          pod init
          pod install
      - name: Build Capacitor iOS
        script: |
          npx cap sync ios
          cd ios/App
          pod install --repo-update
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release archive \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM=$APPLE_DEVELOPER_TEAM_ID
    artifacts:
      - build/*.ipa

workflows:
  ios-native:
    name: iOS Native Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 22.0.0
      npm: 10.0.0
      vars:
        XCODE_SCHEME: "App"
        BUNDLE_ID: "za.co.mygolfdigital.app"
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
          npm install -g @capacitor/cli
      
      - name: Add iOS platform
        script: |
          npx cap add ios
      
      - name: Sync Capacitor
        script: |
          npx cap sync ios
      
      - name: Find and build iOS
        script: |
          # Find the workspace file
          WORKSPACE_PATH=$(find ios -name "*.xcworkspace" | head -1)
          PROJECT_PATH=$(find ios -name "*.xcodeproj" | head -1)
          
          echo "Found workspace: $WORKSPACE_PATH"
          echo "Found project: $PROJECT_PATH"
          
          # Get the directory containing the workspace
          WORKSPACE_DIR=$(dirname "$WORKSPACE_PATH")
          WORKSPACE_NAME=$(basename "$WORKSPACE_PATH")
          
          cd "$WORKSPACE_DIR"
          xcode-project build-ipa \
            --workspace "$WORKSPACE_NAME" \
            --scheme "$XCODE_SCHEME" \
            --configuration Release \
            --archive-flags "-allowProvisioningUpdates"
    
    artifacts:
      - build/ios/ipa/*.ipa
